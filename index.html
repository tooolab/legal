<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./shared.css" />
  <style>
    .doc-list { list-style: none; padding: 0; margin: 0; }
    .doc-list li { padding: 0; }
    .doc-list li::before { display: none; }
    .doc-list a {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 0;
      border-bottom: 1px solid var(--border);
      text-decoration: none;
    }
    .doc-list li:first-child a { border-top: 1px solid var(--border); }
    .doc-list a:hover .doc-name { color: var(--primary); }
    .doc-list a svg { color: var(--muted-foreground); width: 20px; height: 20px; flex-shrink: 0; }
    .doc-info { flex: 1; }
    .doc-name { font-size: 17px; font-weight: 500; color: var(--foreground); display: block; transition: color 150ms; }
    .doc-date { font-size: 14px; color: var(--muted-foreground); display: block; margin-top: 4px; }
    .group-title {
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--muted-foreground);
      margin-top: 48px;
      margin-bottom: 0;
    }
  </style>
  <script>!function(){var t=localStorage.getItem('theme'),d=t==='dark'||(!t&&matchMedia('(prefers-color-scheme:dark)').matches);document.documentElement.classList.toggle('dark',d);document.documentElement.classList.toggle('light',!d&&!!t)}()</script>
</head>

        </div>
        <span class="logo-text">Tooolab Inc.</span>

      <button class="icon-btn" data-theme-toggle aria-label="Toggle theme"></button>

        </a>

      <li>
